version: "2"
sql:
  - schema: "migrations/"
    queries: "internal/store/query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type: "encoding/json.RawMessage"
          # Postgres ENUMs → plain string (otherwise sqlc emits interface{}).
          # Keeps generated structs strongly typed (was hand-patched before).
          - db_type: "parameters_applies_to_enum"
            go_type: "string"
          - db_type: "parameters_value_type_enum"
            go_type: "string"
          - db_type: "parameter_history_change_type_enum"
            go_type: "string"

name: policy7

services:
  app:
    build: .
    ports: ["8085:8085"]
    env_file:
      - path: .env
        required: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: policy7
      POSTGRES_PASSWORD: policy7secret
      POSTGRES_DB: policy7
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U policy7"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - policy7-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"
    volumes:
      - policy7-redisdata:/data

volumes:
  policy7-pgdata:
  policy7-redisdata:
